name: sirius
description: Sirius — Robot Dog Control
publish_to: 'none'
version: 1.1.0

environment:
  sdk: ^3.10.0

resolution: workspace

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  han_dog_message: ^1.0.0
  grpc: ^5.1.0
  protobuf: ^6.0.0
  fl_chart: ^0.70.2
  path: ^1.9.0
  intl: ^0.20.0
  window_manager: ^0.4.3
  file_picker: ^8.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
  fonts:
    - family: Inter
      fonts:
        - asset: assets/fonts/Inter-Regular.ttf
          weight: 400
        - asset: assets/fonts/Inter-Medium.ttf
          weight: 500
        - asset: assets/fonts/Inter-SemiBold.ttf
          weight: 600
        - asset: assets/fonts/Inter-Bold.ttf
          weight: 700

