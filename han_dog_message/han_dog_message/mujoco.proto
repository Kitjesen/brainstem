// han_dog_message/mujoco.proto
//
// MuJoCo 仿真器接口 — 用于 sim-to-real 验证和可视化。

syntax = "proto3";

import "google/protobuf/empty.proto";
import "han_dog_message/common.proto";
import "google/protobuf/duration.proto";

package han_dog;

// MuJoCo 物理仿真服务。
// 由 Python 端实现，Dart 端作为客户端调用。
service Mujoco {
  // 初始化仿真器：设置机器人模型和初始姿态。
  rpc SetModel(RobotModel) returns (google.protobuf.Empty);
  // 执行一步物理仿真：传入目标关节角度，返回仿真后的传感器状态。
  rpc Step(Matrix4) returns (SimState);
}

// MuJoCo 可视化服务。
// 用于将仿真/真机数据回放到 MuJoCo viewer 中。
service MujocoViewer {
  // 播放一帧：将广义坐标/速度发送到 viewer 进行渲染。
  rpc Play(ViewerFrame) returns (google.protobuf.Empty);
}

// MuJoCo viewer 的一帧数据。
message ViewerFrame {
  // 广义坐标 (qpos)：MuJoCo 模型的位置/姿态状态。
  ArrayFloat qpos = 1;
  // 广义速度 (qvel)：MuJoCo 模型的速度状态。
  ArrayFloat qvel = 2;
  // 相对于会话开始时间的时间戳。
  google.protobuf.Duration timestamp = 3;
}
