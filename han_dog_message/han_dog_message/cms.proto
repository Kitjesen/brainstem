// han_dog_message/cms.proto
//
// CMS (Command & Monitoring Service) — 四足机器人的主控 gRPC 服务。
// 提供运动控制指令和实时传感器数据流。

syntax = "proto3";

import "google/protobuf/empty.proto";
import "han_dog_message/common.proto";
import "google/protobuf/timestamp.proto";
import "google/protobuf/duration.proto";

package han_dog;

// 四足机器人命令与监控服务。
//
// 控制类 RPC（受仲裁器限制，遥控器优先级更高）：
//   Enable / Disable / Walk / StandUp / SitDown
//
// 仿真类 RPC（仅在 sim 模式下使用）：
//   Tick / Step
//
// 监控类 RPC（不受仲裁限制，任何客户端均可订阅）：
//   ListenHistory / ListenImu / ListenJoint / GetStartTime / GetParams
service Cms {
  // ──── 硬件控制 ────

  // 使能所有电机（硬件级操作，不经仲裁）。
  rpc Enable(google.protobuf.Empty) returns (google.protobuf.Empty);
  // 禁用所有电机（硬件级操作，不经仲裁）。
  rpc Disable(google.protobuf.Empty) returns (google.protobuf.Empty);

  // ──── 运动指令（经仲裁器，可能被拒绝） ────

  // 行走：传入方向向量 (x=前后, y=左右, z=旋转)，范围 [-1, 1]。
  rpc Walk(Vector3) returns (google.protobuf.Empty);
  // 从坐姿过渡到站立姿态。
  rpc StandUp(google.protobuf.Empty) returns (google.protobuf.Empty);
  // 从站立过渡到坐姿。
  rpc SitDown(google.protobuf.Empty) returns (google.protobuf.Empty);

  // ──── 仿真专用 ────

  // 推进一个仿真步（sim 模式），返回当前 History。
  rpc Tick(google.protobuf.Empty) returns (History);
  // 向控制器注入仿真传感器数据。
  rpc Step(SimState) returns (google.protobuf.Empty);

  // ──── 查询与监控 ────

  // 获取服务启动时间（UTC）。
  rpc GetStartTime(google.protobuf.Empty) returns (google.protobuf.Timestamp);

  // 实时推理历史流：每个推理周期（~20ms）发送一帧。
  rpc ListenHistory(google.protobuf.Empty) returns (stream History);
  // 实时 IMU 数据流。
  rpc ListenImu(google.protobuf.Empty) returns (stream Imu);
  // 实时关节数据流（单关节上报或全关节快照）。
  rpc ListenJoint(google.protobuf.Empty) returns (stream Joint);

  // 获取机器人模型参数。
  rpc GetParams(google.protobuf.Empty) returns (Params);

  // ──── 策略切换 ────

  // 切换到指定策略。机器人必须在 Grounded 状态。
  rpc SwitchProfile(ProfileRequest) returns (ProfileInfo);
  // 获取当前策略信息。
  rpc GetProfile(google.protobuf.Empty) returns (ProfileInfo);
}

// 单次推理周期的完整观测数据（RL policy 的输入/输出）。
message History {
  // IMU 角速度 (rad/s)，body frame。
  Vector3 gyroscope = 1;
  // 重力在 body frame 下的投影（单位向量，静止时为 [0, 0, -1]）。
  Vector3 projected_gravity = 2;
  // 当前运动指令。
  Command command = 3;
  // 当前关节角度 (rad)。
  Matrix4 joint_position = 4;
  // 当前关节角速度 (rad/s)。
  Matrix4 joint_velocity = 5;
  // 上一步 policy 输出的目标关节角度 (rad)。
  Matrix4 action = 6;
  // 当前步 policy 输出的目标关节角度 (rad)。
  Matrix4 next_action = 7;
  // 相对于会话开始时间的时间戳。
  google.protobuf.Duration timestamp = 8;
  // 当前 PD 控制器的比例增益（16 个关节）。
  Matrix4 kp = 9;
  // 当前 PD 控制器的微分增益（16 个关节）。
  Matrix4 kd = 10;
}

// IMU 传感器数据。
message Imu {
  // 角速度 (rad/s)，body frame。
  Vector3 gyroscope = 1;
  // 姿态四元数（world → body 旋转）。
  Quaternion quaternion = 2;
  // 相对于会话开始时间的时间戳。
  google.protobuf.Duration timestamp = 3;
}

// 关节数据（支持单关节上报和全关节快照两种模式）。
message Joint {
  oneof data {
    // 单个关节的状态上报（CAN 总线逐个上报时使用）。
    SingleJoint single_joint = 1;
    // 全部 16 个关节的聚合快照。
    AllJoints all_joints = 2;
  }
  // 相对于会话开始时间的时间戳。
  google.protobuf.Duration timestamp = 3;
}

// 单个关节的状态。
message SingleJoint {
  // 关节 ID（参见 Matrix4 的关节索引 0-15）。
  uint32 id = 1;
  // 关节角度 (rad)。
  float position = 2;
  // 关节角速度 (rad/s)。
  float velocity = 3;
  // 关节力矩 (N·m)。
  float torque = 4;
  // 电机状态码（具体含义取决于电机驱动协议）。
  uint32 status = 5;
}

// 全部关节的聚合快照。
message AllJoints {
  // 16 个关节角度 (rad)。
  Matrix4 position = 1;
  // 16 个关节角速度 (rad/s)。
  Matrix4 velocity = 2;
  // 16 个关节力矩 (N·m)。
  Matrix4 torque = 3;
  // 16 个电机状态码。
  Matrix4Int32 status = 4;
}

// 机器人参数查询响应。
message Params {
  // 当前机器人模型参数。
  RobotModel robot = 1;
}

// 策略切换请求。
message ProfileRequest {
  // 目标策略名称。
  string name = 1;
}

// 策略信息（当前策略名称 + 可用策略列表 + 说明）。
message ProfileInfo {
  // 当前激活的策略名称。
  string current = 1;
  // 所有可用策略名称（与 descriptions 按索引对应）。
  repeated string available = 2;
  // 各策略的说明（与 available 并列）。
  repeated string descriptions = 3;
  // 当前策略的说明。
  string current_description = 4;
}

// 运动指令。
message Command {
  oneof data {
    // 空闲：保持当前姿态，不进行推理。
    google.protobuf.Empty idle = 1;
    // 站起：从坐姿平滑过渡到站立姿态。
    google.protobuf.Empty stand_up = 2;
    // 坐下：从站立平滑过渡到坐姿。
    google.protobuf.Empty sit_down = 3;
    // 行走：(x=前后, y=左右, z=旋转)，范围 [-1, 1]。
    Vector3 walk = 4;
  }
}
