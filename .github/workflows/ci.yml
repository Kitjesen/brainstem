name: CI

on:
  push:
    branches: [master]
    tags: ['v*']
  pull_request:
    branches: [master]

jobs:
  # ── Dart 包：analyze + test ─────────────────────────────────
  dart:
    name: Dart (analyze + test)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: dart-lang/setup-dart@v1
        with:
          sdk: stable

      - name: Install dependencies
        run: dart pub get
        working-directory: brainstem

      - name: Analyze han_dog_brain
        run: dart analyze han_dog_brain/
        working-directory: brainstem

      - name: Analyze han_dog
        run: dart analyze han_dog/
        working-directory: brainstem

      - name: Analyze frequency_watch
        run: dart analyze frequency_watch/
        working-directory: brainstem

      - name: Analyze skinny_dog_algebra
        run: dart analyze skinny_dog_algebra/
        working-directory: brainstem

      - name: Test han_dog_brain
        run: dart test han_dog_brain/
        working-directory: brainstem

      - name: Test han_dog
        run: dart test han_dog/
        working-directory: brainstem

      - name: Test frequency_watch
        run: dart test frequency_watch/
        working-directory: brainstem

      - name: Test skinny_dog_algebra
        run: dart test skinny_dog_algebra/
        working-directory: brainstem

  # ── Flutter App：analyze + build ───────────────────────────
  flutter:
    name: Flutter (analyze + build Windows)
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.x'
          channel: stable

      - name: Install Flutter dependencies
        run: flutter pub get
        working-directory: brainstem/sirius

      - name: Analyze sirius
        run: flutter analyze lib/
        working-directory: brainstem/sirius

      - name: Build sirius (Windows)
        run: flutter build windows --release
        working-directory: brainstem/sirius

      - name: Upload Windows artifact
        uses: actions/upload-artifact@v4
        with:
          name: sirius-windows-${{ github.ref_name }}
          path: brainstem/sirius/build/windows/x64/runner/Release/
          retention-days: 30

  # ── Release：仅 tag 推送时触发 ──────────────────────────────
  release:
    name: Create Release
    runs-on: windows-latest
    needs: [dart, flutter]
    if: startsWith(github.ref, 'refs/tags/v')

    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.x'
          channel: stable

      - name: Install Flutter dependencies
        run: flutter pub get
        working-directory: brainstem/sirius

      - name: Build sirius (Windows release)
        run: flutter build windows --release
        working-directory: brainstem/sirius

      - name: Zip artifact
        run: |
          Compress-Archive -Path brainstem/sirius/build/windows/x64/runner/Release/* `
            -DestinationPath sirius-${{ github.ref_name }}-windows.zip
        shell: pwsh

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: Release ${{ github.ref_name }}
          body_path: brainstem/sirius/CHANGELOG.md
          files: sirius-${{ github.ref_name }}-windows.zip
          draft: false
          prerelease: ${{ contains(github.ref_name, '-') }}
