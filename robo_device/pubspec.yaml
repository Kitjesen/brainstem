name: robo_device
description: Hardware drivers for robot dog (CAN bus, serial port).
version: 1.0.0
repository: https://github.com/Kitjesen/brainstem

environment:
  sdk: ^3.10.0

resolution: workspace

dependencies:
  robo_device_proto: ^1.0.0  # workspace 本地包
  pcan:
    git:
      url: https://github.com/QiongPei/pcan
      path: dart/pcan
      tag_pattern: v{{version}}
    version: ^2.0.1
  serial_port:
    git:
      url: https://github.com/QiongPei/serial_port
      path: dart/serial_port
      tag_pattern: v{{version}}
    version: ^1.1.5
  protoframe:
    git:
      url: https://github.com/QiongPei/protoframe
      path: dart/
      tag_pattern: v{{version}}
    version: ^0.2.1
  logging: ^1.3.0

dev_dependencies:
  lints: ^6.0.0
  test: ^1.25.6
