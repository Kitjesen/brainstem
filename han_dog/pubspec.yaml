name: han_dog
description: Main runner for Han Dog quadruped robot (real hardware).
version: 1.3.0
publish_to: none

environment:
  sdk: ^3.10.0

resolution: workspace

dependencies:
  # ── Workspace 内部包（workspace 自动解析为本地版本）──────────
  skinny_dog_algebra: ^1.0.0
  frequency_watch: ^1.0.0
  han_dog_brain: ^1.0.0
  han_dog_message: ^1.0.0

  # ── 硬件驱动（外部 Git，未纳入 workspace）────────────────────
  robo_device:
    git:
      url: https://github.com/Kitjesen/robo_device
      path: dart/robo_device
      ref: main  # TODO: pin to specific commit SHA before production
  robo_device_proto:
    git:
      url: https://github.com/Kitjesen/robo_device_proto
      path: dart/robo_device_proto
      ref: HEAD  # TODO: pin to specific commit SHA before production (must match robo_device's dependency)

  # ── 第三方包 ──────────────────────────────────────────────────
  grpc: ^5.1.0
  rxdart: ^0.28.0
  vector_math: ^2.2.0
  cms: ^1.4.3
  logging: ^1.3.0

dev_dependencies:
  lints: ^6.0.0
  test: ^1.25.6
  fake_async: ^1.3.3
  mocktail: ^1.0.4
